<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arknights Endfield - Claim Up to 135 Launch Rewards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="background-image"></div>
        <div class="overlay"></div>
        <div class="vignette-overlay"></div>

        <div class="content">
            <div class="content-blur-backing"></div>

            <div class="main-content">
                <h1>
                    <span class="title-line">Claim Up to</span>
                    <span class="number-135">135</span>
                    <span class="title-line">Launch Rewards</span>
                </h1>

                <p class="subtitle">
                    Enter Talos-II in a real-time tactical RPG experience. High-quality graphics. Free to play.
                </p>

                <button id="downloadBtn" class="cta-button">
                    <span class="button-content">
                        <svg class="download-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Get Access Now
                    </span>
                </button>

                <p class="pc-version">PC Version Available</p>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
